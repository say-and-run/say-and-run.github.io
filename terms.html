    <h1>プライバシーポリシー</h1>
    <p>ユーザーのプライバシーを最優先に考え、以下の通りポリシーを定めます。</p>
    <h2>第1条（音声データの非送信）</h2>
    <p>マイクから取得した音声データは、すべてローカルPC上で処理されます。外部サーバーへ送信されることは一切ありません。</p>
    <h2>第2条（個人情報の非収集）</h2>
    <p>本アプリは、氏名やメールアドレス等の個人情報を、アプリ側で無断に収集・蓄積することはありません。</p>
